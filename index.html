<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c2f33; margin: 0; color: #fff; }
        .container { background: #23272a; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: none; border-radius: 4px; background: #40444b; color: white; }
        button { width: 100%; padding: 10px; background-color: #7289da; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #5b6eae; }
        #error-msg { color: #f04747; display: none; margin-bottom: 10px; font-size: 14px; }
        #chat-box { display: none; width: 400px; }
        #messages { height: 300px; overflow-y: auto; background: #40444b; border-radius: 4px; margin-bottom: 10px; padding: 10px; text-align: left; }
        .msg { margin-bottom: 8px; word-break: break-all; }
        .msg strong { color: #7289da; }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <h2>Ingreso al Chat</h2>
        <input type="text" id="ngrok-url" placeholder="URL de Ngrok">
        <input type="text" id="username" placeholder="Usuario (David o Daniela)">
        <input type="password" id="password" placeholder="Contraseña">
        <div id="error-msg">Credenciales incorrectas o falta la URL.</div>
        <button onclick="login()">Conectar</button>
    </div>

    <div class="container" id="chat-box">
        <h2 id="welcome-msg"></h2>
        <div id="messages"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chat-input" placeholder="Escribe tu mensaje..." onkeypress="if(event.key === 'Enter') enviarMensaje()">
            <button style="width: 30%;" onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <script>
        let socket;
        let currentUser;

        function login() {
            // Recoger los datos de las cajas de texto
            let url = document.getElementById("ngrok-url").value.trim();
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("error-msg");

            // Validar que se ha puesto una URL
            if (!url) {
                errorMsg.innerText = "Por favor, introduce tu URL de Ngrok.";
                errorMsg.style.display = "block";
                return;
            }

            // Quitar la barra final de la URL si el usuario la pone por accidente
            if (url.endsWith('/')) {
                url = url.slice(0, -1);
            }

            // Validar credenciales (David o Daniela)
            if ((user === "David" && pass === "david") || (user === "Daniela" && pass === "daniela")) {
                currentUser = user;
                
                // Cambiar las pantallas
                document.getElementById("login-box").style.display = "none";
                document.getElementById("chat-box").style.display = "block";
                document.getElementById("welcome-msg").innerText = "Chat de " + user;
                
                // Llamar a la función que conecta con el Kali
                iniciarChat(url);
            } else {
                errorMsg.innerText = "Usuario o contraseña incorrectos.";
                errorMsg.style.display = "block";
            }
        }

        function iniciarChat(serverUrl) {
            // Conectar con el servidor usando la URL de Ngrok proporcionada
            socket = io(serverUrl);

            // Al conectar, recibimos el historial de mensajes de la base de datos
            socket.on('historial', (mensajesGuardados) => {
                const box = document.getElementById('messages');
                box.innerHTML = '';
                mensajesGuardados.forEach(msg => mostrarMensaje(msg.user, msg.text));
            });

            // Escuchar mensajes nuevos en tiempo real
            socket.on('mensaje_recibido', (data) => {
                mostrarMensaje(data.user, data.text);
            });
            
            // Si hay error de conexión
            socket.on('connect_error', () => {
                alert("Error: No se pudo conectar a " + serverUrl + ". ¿Está el servidor de Kali encendido?");
            });
        }

        function enviarMensaje() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            
            if (texto !== "") {
                // Enviar el mensaje al servidor (Kali)
                socket.emit('nuevo_mensaje', { user: currentUser, text: texto });
                input.value = ''; 
            }
        }

        function mostrarMensaje(usuario, texto) {
            const box = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg';
            
            // Si el mensaje es tuyo, le ponemos otro color
            if (usuario === currentUser) {
                div.innerHTML = `<strong style="color: #43b581;">Tú:</strong> ${texto}`;
            } else {
                div.innerHTML = `<strong>${usuario}:</strong> ${texto}`;
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight; // Auto-bajar la barra de scroll
        }
    </script>
</body>
</html>
